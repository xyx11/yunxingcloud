# ============================================
# Logstash 管道: 解析 yunxingcloud JSON 日志
# ============================================

input {
  beats {
    port => 5044
  }
}

filter {
  # 解析 JSON 格式日志 (Logback JSON encoder)
  json {
    source => "message"
    target => "log"
  }

  # 补充字段
  mutate {
    add_field => {
      "[log][environment]" => "production"
    }
  }

  # 按服务名建立索引
  if [log][service] {
    mutate {
      add_field => { "[@metadata][index]" => "yunxingcloud-%{[log][service]}-%{+YYYY.MM.dd}" }
    }
  } else {
    mutate {
      add_field => { "[@metadata][index]" => "yunxingcloud-%{+YYYY.MM.dd}" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index]}"
  }
}
