spring:
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        import-check:
          enabled: false
        enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10,expireAfterWrite=1m
  mail:
    host: localhost
    port: 25

jwt:
  secret: test-secret-key-for-unit-tests-only

oauth2:
  client:
    id: test-client
    secret: test-secret
    redirect-uri: http://127.0.0.1:9090/callback

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: WARN
    com.yunxingcloud: DEBUG
