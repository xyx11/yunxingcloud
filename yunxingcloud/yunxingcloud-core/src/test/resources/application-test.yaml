spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

jwt:
  secret: test-jwt-secret-for-integration-tests-min-256-bits

oauth2:
  client:
    id: test-client
    secret: secret
    redirect-uri: http://127.0.0.1:9090/callback

logging:
  level:
    root: WARN
    com.yunxingcloud: INFO
