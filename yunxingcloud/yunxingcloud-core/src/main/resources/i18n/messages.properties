# ===== 通用消息 =====
common.success=操作成功
common.error=操作失败
common.not_found=资源不存在
common.bad_request=请求参数错误
common.internal_error=服务器内部错误

# ===== 认证/授权 =====
auth.bad_credentials=用户名或密码错误
auth.access_denied=权限不足
auth.unauthorized=未登录或 Token 已过期
auth.token_invalid=无效的令牌
