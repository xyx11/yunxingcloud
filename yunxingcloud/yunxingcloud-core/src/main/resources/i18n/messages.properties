password.invalid_token=重置令牌无效或已过期
password.weak=密码强度不足
password.reset_success=密码重置成功，请使用新密码登录
password.change_success=密码修改成功
password.old_wrong=当前密码不正确
password.not_found=用户不存在

# ===== 注册 =====
register.username_blank=用户名不能为空
register.duplicate_username=用户名已存在
register.password_weak=密码强度不足
register.success=注册成功
register.pending_approval=注册成功，请等待管理员审核

# ===== 参数校验 =====
validate.username_size=用户名长度2-50位
validate.password_min=密码至少6位
validate.email_format=邮箱格式不正确
validate.not_blank=不能为空
validate.type_mismatch=参数类型错误
validate.body_malformed=请求格式错误

# ===== 文件 =====
