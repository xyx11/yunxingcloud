<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Login Test</title></head>
<body>
<h2>Login Test</h2>
<input id="user" placeholder="username" value="admin"><br><br>
<input id="pass" type="password" placeholder="password" value="admin123"><br><br>
<button onclick="doLogin()">Login</button>
<pre id="result"></pre>

<script>
async function doLogin() {
  const r = document.getElementById('result')
  r.textContent = 'Logging in...'
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('user').value,
        password: document.getElementById('pass').value,
      })
    })
    const data = await res.json()
    r.textContent = JSON.stringify(data, null, 2)
  } catch(e) {
    r.textContent = 'ERROR: ' + e.message
  }
}
</script>
</body>
</html>
