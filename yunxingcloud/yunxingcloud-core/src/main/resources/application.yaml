spring:
  application:
    name: yunxingcloud

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sso_yunxingcloud?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=30m

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:yunxingcloud-jwt-secret-key-2024-very-long-secret-key-min-256-bits}

oauth2:
  client:
    id: ${OAUTH2_CLIENT_ID:test-client}
    secret: ${OAUTH2_CLIENT_SECRET:secret}
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://127.0.0.1:9090/callback}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

server:
  port: 8080

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{requestId}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.yunxingcloud: DEBUG
    org.springframework.security: DEBUG
