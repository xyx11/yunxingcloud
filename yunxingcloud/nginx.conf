upstream yunxingcloud_backend {
    server 127.0.0.1:8090 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name www.yunxingcloud.com;
    if ($host = www.yunxingcloud.com) {
        return 301 https://$host$request_uri;
    }
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.yunxingcloud.com;
    ssl_certificate /etc/letsencrypt/live/www.yunxingcloud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.yunxingcloud.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ws: wss:" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    access_log /var/log/nginx/yunxingcloud_access.log;
    error_log /var/log/nginx/yunxingcloud_error.log;
    client_max_body_size 10m;
    client_body_timeout 60s;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_vary on;

    location /assets/ {
        proxy_pass http://yunxingcloud_backend;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = / {
        proxy_pass http://yunxingcloud_backend;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location = /sw.js {
        proxy_pass http://yunxingcloud_backend;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    location = /favicon.ico {
        return 301 /favicon.svg;
    }

    # Mall 商城前端
    location /mall/ {
        alias /opt/yunxingcloud/mall/;
        try_files $uri $uri/ /mall/index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /mall/assets/ {
        alias /opt/yunxingcloud/mall/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://yunxingcloud_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_timeout 10s;
        proxy_next_upstream_tries 2;
    }

    location /actuator/ {
        proxy_pass http://yunxingcloud_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /oauth2/ {
        proxy_pass http://yunxingcloud_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://yunxingcloud_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    location / {
        proxy_pass http://yunxingcloud_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
