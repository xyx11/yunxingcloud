# ============================================
# yunxingcloud Nginx 生产配置
# 放置于: /etc/nginx/conf.d/yunxingcloud.conf
# ============================================

upstream yunxingcloud_backend {
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name www.yunxingcloud.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.yunxingcloud.com;

    # SSL 证书（使用 Let's Encrypt / 阿里云 SSL）
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # 日志
    access_log /var/log/nginx/yunxingcloud_access.log;
    error_log  /var/log/nginx/yunxingcloud_error.log;

    # 客户端上传限制
    client_max_body_size 10m;
    client_body_timeout 60s;

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_vary on;

    # 静态资源（前端 SPA）
    location /assets/ {
        proxy_pass http://yunxingcloud_backend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /favicon.ico {
        proxy_pass http://yunxingcloud_backend;
        expires 7d;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://yunxingcloud_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Actuator
    location /actuator/ {
        proxy_pass http://yunxingcloud_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # 限制访问 IP（可选）
        # allow 10.0.0.0/8;
        # deny all;
    }

    # OAuth2 端点
    location /oauth2/ {
        proxy_pass http://yunxingcloud_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA 前端（其余路径转发）
    location / {
        proxy_pass http://yunxingcloud_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
