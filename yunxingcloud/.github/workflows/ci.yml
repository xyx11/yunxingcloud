name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [yunxingcloud-core, yunxingcloud-usercenter, yunxingcloud-gateway,
                 yunxingcloud-payment, yunxingcloud-order, yunxingcloud-inventory]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: maven }
      - run: ./mvnw test -pl ${{ matrix.module }} -am -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: cd frontend && npm ci && npx eslint . --ext .vue,.ts && npx vue-tsc --noEmit && npm run build
      - run: cd frontend-mall && npm ci && npx eslint . --ext .vue,.ts && npx vue-tsc --noEmit && npm test && npm run build

  docker:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: yunxingcloud-core, port: 8080 }
          - { name: yunxingcloud-usercenter, port: 8081 }
          - { name: yunxingcloud-gateway, port: 8090 }
          - { name: yunxingcloud-payment, port: 8083 }
          - { name: yunxingcloud-order, port: 8084 }
          - { name: yunxingcloud-inventory, port: 8085 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd frontend && npm ci && npm run build
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - run: ./mvnw package -pl ${{ matrix.service.name }} -am -DskipTests -q
      - run: |
          docker build \
            --build-arg SERVICE=${{ matrix.service.name }} \
            --build-arg PORT=${{ matrix.service.port }} \
            -t ghcr.io/${{ github.repository_owner }}/${{ matrix.service.name }}:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/${{ matrix.service.name }}:latest \
            .
      - run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.service.name }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.service.name }}:latest