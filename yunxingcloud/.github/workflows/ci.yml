name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Compile & Test (core)
        run: ./mvnw test -pl yunxingcloud-core -am -q
      - name: Compile & Test (usercenter)
        run: ./mvnw test -pl yunxingcloud-usercenter -am -q
      - name: Compile & Test (gateway)
        run: ./mvnw test -pl yunxingcloud-gateway -am -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Lint
        run: cd frontend && npm ci && npx eslint src/ --ext .vue,.ts --max-warnings 20
      - name: Unit Tests
        run: cd frontend && npx vitest run
      - name: Type Check & Build
        run: cd frontend && npm run build

  docker:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [yunxingcloud-core, yunxingcloud-usercenter, yunxingcloud-gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Build Frontend (for JAR)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend && npm ci && npm run build
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Package JAR
        run: ./mvnw package -pl ${{ matrix.service }} -am -DskipTests -q
      - name: Build Docker Image
        run: |
          docker build \
            --build-arg SERVICE=${{ matrix.service }} \
            --build-arg PORT=${{ matrix.service == 'yunxingcloud-core' && '8080' || matrix.service == 'yunxingcloud-usercenter' && '8081' || '8090' }} \
            -t ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest \
            .
      - name: Push to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}:latest