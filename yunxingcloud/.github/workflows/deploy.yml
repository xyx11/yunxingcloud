name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build Backend
        run: |
          ./mvnw package -pl yunxingcloud-core -am -DskipTests -q
          ./mvnw package -pl yunxingcloud-usercenter -am -DskipTests -q
          ./mvnw package -pl yunxingcloud-gateway -am -DskipTests -q

      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: |
            yunxingcloud-core/target/yunxingcloud-core-*.jar
            yunxingcloud-usercenter/target/yunxingcloud-usercenter-*.jar
            yunxingcloud-gateway/target/yunxingcloud-gateway-*.jar
          target: /opt/yunxingcloud/app/
          strip_components: 0

      - name: Restart Services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            # Copy JARs to app dir
            cp yunxingcloud-core/target/yunxingcloud-core-*.jar /opt/yunxingcloud/app/
            cp yunxingcloud-usercenter/target/yunxingcloud-usercenter-*.jar /opt/yunxingcloud/app/
            cp yunxingcloud-gateway/target/yunxingcloud-gateway-*.jar /opt/yunxingcloud/app/
            # Restart all services
            systemctl restart yunxingcloud-core yunxingcloud-usercenter yunxingcloud-gateway
            # Wait for startup
            sleep 30
            # Health check
            curl -f http://localhost:8090/actuator/health || exit 1
            echo "Deploy successful"
