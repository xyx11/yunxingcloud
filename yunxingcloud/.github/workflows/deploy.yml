name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yunxingcloud
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: maven }
      - run: ./mvnw test -q

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yunxingcloud
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: maven }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm, cache-dependency-path: yunxingcloud/frontend/package-lock.json }

      - name: Build Admin Frontend
        run: cd frontend && npm ci && npm run build

      - name: Build Mall Frontend
        run: cd frontend-mall && npm ci && npm run build

      - name: Build All Services
        run: ./mvnw package -DskipTests -q -T 4C

      - name: Deploy to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: |
            yunxingcloud/yunxingcloud-core/target/yunxingcloud-core-[0-9]*.jar
            yunxingcloud/yunxingcloud-usercenter/target/yunxingcloud-usercenter-[0-9]*.jar
            yunxingcloud/yunxingcloud-gateway/target/yunxingcloud-gateway-[0-9]*.jar
            yunxingcloud/yunxingcloud-payment/target/yunxingcloud-payment-[0-9]*.jar
            yunxingcloud/yunxingcloud-order/target/yunxingcloud-order-[0-9]*.jar
            yunxingcloud/yunxingcloud-inventory/target/yunxingcloud-inventory-[0-9]*.jar
            yunxingcloud/frontend-mall/dist/
          target: /opt/yunxingcloud/app/
          strip_components: 1

      - name: Restart Services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd /opt/yunxingcloud/app
            # Copy JARs
            cp yunxingcloud-usercenter/target/yunxingcloud-usercenter-[0-9]*.jar /opt/yunxingcloud/app/yunxingcloud-usercenter.jar
            cp yunxingcloud-payment/target/yunxingcloud-payment-[0-9]*.jar /opt/yunxingcloud/app/yunxingcloud-payment.jar
            cp yunxingcloud-order/target/yunxingcloud-order-[0-9]*.jar /opt/yunxingcloud/app/yunxingcloud-order.jar
            cp yunxingcloud-inventory/target/yunxingcloud-inventory-[0-9]*.jar /opt/yunxingcloud/app/yunxingcloud-inventory.jar
            cp yunxingcloud-core/target/yunxingcloud-core-[0-9]*.jar /opt/yunxingcloud/app/yunxingcloud-core.jar
            cp yunxingcloud-gateway/target/yunxingcloud-gateway-[0-9]*.jar /opt/yunxingcloud/app/yunxingcloud-gateway.jar
            # Deploy Mall
            rm -rf /opt/yunxingcloud/mall/*
            cp -r frontend-mall/dist/* /opt/yunxingcloud/mall/
            # Restart in dependency order
            for svc in yunxingcloud-usercenter yunxingcloud-payment yunxingcloud-order yunxingcloud-inventory yunxingcloud-core yunxingcloud-gateway; do
              systemctl restart $svc
              sleep 8
            done
            # Health check
            sleep 10
            for port in 8081 8083 8084 8085 8080 8090; do
              curl -sf http://127.0.0.1:$port/actuator/health || { echo "Port $port FAILED"; exit 1; }
            done
            echo "Deploy successful — 6 services healthy"