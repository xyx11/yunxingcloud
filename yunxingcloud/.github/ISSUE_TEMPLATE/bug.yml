name: Bug Report
description: 报告一个问题
labels: [bug]
body:
  - type: input
    attributes:
      label: 版本
      placeholder: v2.3.0
  - type: textarea
    attributes:
      label: 复现步骤
      placeholder: |
        1. 访问 ...
        2. 点击 ...
        3. 出现错误
    validations:
      required: true
  - type: textarea
    attributes:
      label: 预期行为
  - type: textarea
    attributes:
      label: 实际行为
  - type: textarea
    attributes:
      label: 日志/截图