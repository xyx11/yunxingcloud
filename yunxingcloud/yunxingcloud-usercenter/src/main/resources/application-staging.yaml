# UserCenter Staging 配置
spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/yunxingcloud_usercenter?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    hikari:
      maximum-pool-size: 8
      minimum-idle: 3
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:nacos:8848}
      config:
        server-addr: ${NACOS_SERVER:nacos:8848}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:sentinel:8082}

server:
  shutdown: graceful

logging:
  level:
    root: WARN
    com.yunxingcloud: INFO