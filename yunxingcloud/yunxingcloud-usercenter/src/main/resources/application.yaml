spring:
  application:
    name: yunxingcloud-usercenter

  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

  config:
    import: optional:nacos:${spring.application.name}.yaml

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
    loadbalancer:
      nacos:
        enabled: true
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8082}
      eager: true
      datasource:
        flow:
          nacos:
            server-addr: ${NACOS_SERVER:127.0.0.1:8848}
            namespace: ${NACOS_NAMESPACE:}
            data-id: ${spring.application.name}-sentinel-flow
            group-id: DEFAULT_GROUP
            data-type: json
            rule-type: flow
        degrade:
          nacos:
            server-addr: ${NACOS_SERVER:127.0.0.1:8848}
            namespace: ${NACOS_NAMESPACE:}
            data-id: ${spring.application.name}-sentinel-degrade
            group-id: DEFAULT_GROUP
            data-type: json
            rule-type: degrade

  flyway:
    enabled: true
    locations: classpath:db/migration

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/yunxingcloud_usercenter?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:yunxingcloud123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  sql:
    init:
      mode: never

  security:
    oauth2:
      client:
        registration:
          wechat:
            client-id: ${WECHAT_CLIENT_ID:none}
            client-secret: ${WECHAT_CLIENT_SECRET:none}
            client-name: 微信
            redirect-uri: '{baseUrl}/login/oauth2/code/{registrationId}'
            authorization-grant-type: authorization_code
            scope: snsapi_login
          qq:
            client-id: ${QQ_CLIENT_ID:none}
            client-secret: ${QQ_CLIENT_SECRET:none}
            client-name: QQ
            redirect-uri: '{baseUrl}/login/oauth2/code/{registrationId}'
            authorization-grant-type: authorization_code
            scope: get_user_info
          alipay:
            client-id: ${ALIPAY_CLIENT_ID:none}
            client-secret: ${ALIPAY_CLIENT_SECRET:none}
            client-name: 支付宝
            redirect-uri: '{baseUrl}/login/oauth2/code/{registrationId}'
            authorization-grant-type: authorization_code
            scope: auth_user
        provider:
          wechat:
            authorization-uri: https://open.weixin.qq.com/connect/qrconnect
            token-uri: https://api.weixin.qq.com/sns/oauth2/access_token
            user-info-uri: https://api.weixin.qq.com/sns/userinfo
            user-name-attribute: openid
          qq:
            authorization-uri: https://graph.qq.com/oauth2.0/authorize
            token-uri: https://graph.qq.com/oauth2.0/token
            user-info-uri: https://graph.qq.com/oauth2.0/me
            user-name-attribute: openid
          alipay:
            authorization-uri: https://openauth.alipay.com/oauth2/publicAppAuthorize.htm
            token-uri: https://openapi.alipay.com/gateway.do
            user-info-uri: https://openapi.alipay.com/gateway.do
            user-name-attribute: user_id

  mail:
    host: localhost
    port: 25

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  health:
    mail:
      enabled: false

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8081
  shutdown: graceful
  lifecycle:
    timeout-per-shutdown-phase: 30s

logging:
  level:
    root: INFO
    com.yunxingcloud: DEBUG
    org.springframework.security: DEBUG
