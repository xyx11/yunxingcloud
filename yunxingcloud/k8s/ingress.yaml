apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yunxingcloud-ingress
  namespace: yunxingcloud
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: api.yunxingcloud.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yunxingcloud-gateway
                port:
                  number: 8090
    - host: admin.yunxingcloud.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yunxingcloud-core
                port:
                  number: 8080
