apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yunxingcloud-ingress
  namespace: yunxingcloud
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.yunxingcloud.com
      secretName: yunxingcloud-tls
  rules:
    - host: www.yunxingcloud.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yunxingcloud-gateway
                port:
                  number: 8090
