apiVersion: apps/v1
kind: Deployment
metadata:
  name: yunxingcloud-core
  namespace: yunxingcloud
  labels:
    app: yunxingcloud-core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: yunxingcloud-core
  template:
    metadata:
      labels:
        app: yunxingcloud-core
    spec:
      containers:
        - name: app
          image: yunxingcloud-core:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: yunxingcloud-config
            - secretRef:
                name: yunxingcloud-secret
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SERVICE_NAME
              value: "yunxingcloud-core"
            - name: DB_URL
              value: "jdbc:mysql://mysql-service:3306/yunxingcloud_core?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai"
          resources:
            requests: { memory: "256Mi", cpu: "200m" }
            limits: { memory: "1Gi", cpu: "1000m" }
          startupProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 5
      restartPolicy: Always
---
