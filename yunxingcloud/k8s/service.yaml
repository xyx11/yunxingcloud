apiVersion: v1
kind: Service
metadata:
  name: yunxingcloud-service
  namespace: yunxingcloud
spec:
  selector:
    app: yunxingcloud-core
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: yunxingcloud
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
