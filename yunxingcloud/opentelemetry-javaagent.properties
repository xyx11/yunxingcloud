# ============================================
# OpenTelemetry Java Agent 配置
# 用法:
#   java -javaagent:opentelemetry-javaagent.jar \
#        -Dotel.javaagent.configuration-file=opentelemetry-javaagent.properties \
#        -jar yunxingcloud-xxx.jar
# ============================================

# 服务名 (每个服务启动时覆盖)
otel.service.name=yunxingcloud
otel.resource.attributes=deployment.environment=production

# 导出器 (可选: otlp, jaeger, zipkin, prometheus, none)
otel.traces.exporter=otlp,logging
otel.metrics.exporter=prometheus
otel.logs.exporter=otlp

# OTLP Collector 地址
otel.exporter.otlp.endpoint=http://localhost:4317
otel.exporter.otlp.protocol=grpc

# 采样 (生产建议: 10% 采样)
otel.traces.sampler=parentbased_traceidratio
otel.traces.sampler.arg=0.1

# 传播格式
otel.propagators=tracecontext,baggage,b3

# 日志集成
otel.instrumentation.logback-appender.enabled=true
otel.instrumentation.log4j-appender.enabled=true

# 特定库的埋点开关
otel.instrumentation.spring-webmvc.enabled=true
otel.instrumentation.spring-web.enabled=true
otel.instrumentation.jdbc.enabled=true
otel.instrumentation.redis-lettuce.enabled=true
otel.instrumentation.kafka.enabled=false