# ============================================
# yunxingcloud 生产 Nginx 配置 (增强版)
# 限流 + TLS 1.3 + Brotli + 安全头
# ============================================

# ---- 限流区域 ----
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn:10m;

upstream yunxingcloud_backend {
    server 127.0.0.1:8090 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.yunxingcloud.com;

    # ---- TLS 1.3 ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_certificate     /etc/letsencrypt/live/www.yunxingcloud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.yunxingcloud.com/privkey.pem;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ---- 安全头 ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' ws: wss:; frame-ancestors 'self'" always;

    # ---- Brotli 压缩 ----
    brotli on;
    brotli_comp_level 6;
    brotli_types text/plain text/css application/json application/javascript text/xml;

    # ---- 连接限制 ----
    limit_conn conn 20;

    # 登录限流
    location /api/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://yunxingcloud_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 限流
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://yunxingcloud_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 商城 SPA
    location /mall/ {
        alias /opt/yunxingcloud/mall/;
        try_files $uri $uri/ /mall/index.html;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # 管理后台 SPA + 静态资源
    location / {
        proxy_pass http://yunxingcloud_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /assets/ {
        proxy_pass http://yunxingcloud_backend;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://yunxingcloud_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # Health (不限流)
    location /actuator/health {
        proxy_pass http://yunxingcloud_backend;
        proxy_set_header Host $host;
    }
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name www.yunxingcloud.com;
    return 301 https://$host$request_uri;
}