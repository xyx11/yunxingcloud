# ============================================
# yunxingcloud 阿里云部署配置
# ============================================

# ---- 域名 ----
APP_DOMAIN=www.yunxingcloud.com
APP_BASE_URL=https://www.yunxingcloud.com

# ---- ECS 服务器 ----
SERVER_HOST=47.95.111.21
SERVER_PORT=22
SERVER_USER=root
DEPLOY_DIR=/opt/yunxingcloud

# ---- 应用配置 ----
APP_PORT=8080
SPRING_PROFILES=prod

# ---- 环境变量 ----
export DB_URL="jdbc:mysql://localhost:3306/sso_yunxingcloud?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai"
export DB_USERNAME=root
export DB_PASSWORD="your_db_password_here"
export JWT_SECRET="your-jwt-secret-at-least-256-bits-long-change-me"
export OAUTH2_CLIENT_ID="yunxingcloud-client"
export OAUTH2_CLIENT_SECRET="your-oauth2-secret-change-me"
export OAUTH2_REDIRECT_URI="https://www.yunxingcloud.com/callback"

# ---- JVM 参数 ----
JAVA_OPTS="-Xms512m -Xmx1024m -XX:+UseG1GC -Duser.timezone=Asia/Shanghai"
