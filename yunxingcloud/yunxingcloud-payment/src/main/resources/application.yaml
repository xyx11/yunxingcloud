spring:
  application:
    name: yunxingcloud-payment

  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/yunxingcloud_payment?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:yunxingcloud123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        import-check:
          enabled: false
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8082}
      eager: true
      datasource:
        flow:
          nacos:
            server-addr: ${NACOS_SERVER:127.0.0.1:8848}
            data-id: ${spring.application.name}-sentinel-flow
            group-id: DEFAULT_GROUP
            data-type: json
            rule-type: flow
        degrade:
          nacos:
            server-addr: ${NACOS_SERVER:127.0.0.1:8848}
            data-id: ${spring.application.name}-sentinel-degrade
            group-id: DEFAULT_GROUP
            data-type: json
            rule-type: degrade

  lifecycle:
    timeout-per-shutdown-phase: 30s

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

server:
  port: 8083
  error:
    whitelabel:
      enabled: false
  shutdown: graceful

# ---- 支付网关配置 ----
# 留空 = mock 模式（开箱即用，返回模拟支付数据）
# 填入真实商户凭证 = live 模式（调用微信/支付宝真实 API）
payment:
  wechat:
    merchant-id:
    merchant-serial-number:
    api-v3-key:
    private-key-path:
    app-id:
  alipay:
    app-id:
    private-key:
    alipay-public-key:
    gateway-url: https://openapi.alipay.com/gateway.do

logging:
  level:
    com.yunxingcloud: INFO
