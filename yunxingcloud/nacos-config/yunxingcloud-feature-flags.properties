# ============================================
# Nacos 动态功能开关 (Data ID: yunxingcloud-feature-flags)
# Group: DEFAULT_GROUP  格式: Properties
# ============================================

# 注册功能
feature.register.enabled=true
feature.register.require-approval=false

# 支付功能
feature.payment.enabled=true
feature.payment.wechat=true
feature.payment.alipay=true
feature.payment.mock=true

# 商城功能
feature.mall.enabled=true
feature.mall.flash-sale=true
feature.mall.coupons=true

# 工单功能
feature.ticket.enabled=true

# 库存预警
feature.inventory.alerts=true
feature.inventory.alerts-threshold=10

# 搜索
feature.search.enabled=true

# 限流参数 (运行时动态调整)
ratelimit.login.max-per-second=5
ratelimit.api.max-per-second=100
ratelimit.ip.max-per-minute=10

# 灰度发布标识
deploy.canary.active=false
deploy.canary.version=