spring:
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        import-check:
          enabled: false
        enabled: false
    sentinel:
      enabled: false
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false

jwt:
  secret: test-jwt-secret-for-inventory-tests-min-256-bits

app:
  redis:
    enabled: false

logging:
  level:
    root: WARN
    com.yunxingcloud: DEBUG