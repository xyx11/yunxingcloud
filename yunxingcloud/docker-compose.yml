version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: yunxingcloud-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-yunxingcloud123}
      MYSQL_DATABASE: sso_yunxingcloud
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: yunxingcloud-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/sso_yunxingcloud?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-yunxingcloud123}
      JWT_SECRET: ${JWT_SECRET:-yunxingcloud-jwt-secret-key-2024-very-long-secret-key-min-256-bits}
      OAUTH2_CLIENT_ID: ${OAUTH2_CLIENT_ID:-test-client}
      OAUTH2_CLIENT_SECRET: ${OAUTH2_CLIENT_SECRET:-secret}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
