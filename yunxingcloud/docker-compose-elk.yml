# ============================================
# yunxingcloud ELK 日志聚合 (追加到 docker-compose.yml)
# 用法: docker-compose -f docker-compose.yml -f docker-compose-elk.yml up -d
# ============================================
version: '3.8'

services:
  elasticsearch:
    image: elasticsearch:8.17.0
    container_name: yunxingcloud-es
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - yunxingcloud
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits: { memory: 1G }

  logstash:
    image: logstash:8.17.0
    container_name: yunxingcloud-logstash
    restart: unless-stopped
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - log_data:/app/logs:ro
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
    ports:
      - "5044:5044"   # Beats input
    networks:
      - yunxingcloud
    depends_on:
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits: { memory: 512M }

  kibana:
    image: kibana:8.17.0
    container_name: yunxingcloud-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - yunxingcloud
    depends_on:
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits: { memory: 512M }

  filebeat:
    image: elastic/filebeat:8.17.0
    container_name: yunxingcloud-filebeat
    restart: unless-stopped
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - log_data:/app/logs:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - yunxingcloud
    depends_on:
      - logstash
      - elasticsearch

volumes:
  es_data:
  log_data:

networks:
  yunxingcloud:
    external: true
