spring:
  application:
    name: yunxingcloud-order
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/yunxingcloud_order?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8082}
      eager: true
      feign:
        enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

server:
  port: 8084
logging:
  level:
    com.yunxingcloud: INFO
