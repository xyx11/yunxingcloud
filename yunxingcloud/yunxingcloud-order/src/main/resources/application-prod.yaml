# ============================================
# yunxingcloud-order 生产环境配置
# ============================================
spring:
  config:
    import: optional:nacos:yunxingcloud-order.yaml
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:3306/yunxingcloud_order?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 10000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 30
          fetch_size: 200
        order_inserts: true
        order_updates: true
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 4
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 30000
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:nacos:8848}
      config:
        server-addr: ${NACOS_SERVER:nacos:8848}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:sentinel:8082}
      eager: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8084
  error:
    whitelabel:
      enabled: false
  shutdown: graceful

logging:
  level:
    root: WARN
    com.yunxingcloud: INFO
  file:
    path: /app/logs
    name: /app/logs/yunxingcloud-order.log

app:
  order:
    expiry-minutes: 15
  inventory:
    default-warehouse-id: 1
