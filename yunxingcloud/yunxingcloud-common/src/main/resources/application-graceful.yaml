# ============================================
# 优雅关闭配置 (所有服务导入此片段)
# 用法: spring.config.import: classpath:application-graceful.yaml
# ============================================

server:
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true